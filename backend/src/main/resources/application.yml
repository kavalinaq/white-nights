spring:
  datasource:
    url: jdbc:postgresql://localhost:5432/whitenights?stringtype=unspecified
    username: user
    password: password
  jpa:
    hibernate:
      ddl-auto: validate
    properties:
      hibernate:
        dialect: org.hibernate.dialect.PostgreSQLDialect
  flyway:
    enabled: true
    locations: classpath:db/migration

server:
  port: 8080
  error:
    include-message: always
    include-binding-errors: always

logging:
  level:
    com.whitenights: DEBUG
    org.springframework.security: DEBUG

auth:
  jwt:
    # Use a secure secret in production!
    secret: "v9y$B&E)H@McQfTjWnZr4u7x!A%D*G-KaPdSgUkXp2s5v8y/B?E(H+MbQeThWmYq"
    access-expiration-ms: 900000 # 15 minutes
    refresh-expiration-ms: 1209600000 # 14 days
